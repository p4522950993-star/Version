<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Registration Form</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Container */
.container {
  display: flex;
  width: 900px;
  background: #fff;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Left Side */
.left {
  width: 40%;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  color: white;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.left h2 {
  font-size: 28px;
  margin-bottom: 10px;
}

.left p {
  font-size: 14px;
  opacity: 0.9;
}

/* Right Side */
.right {
  width: 60%;
  padding: 40px;
}

.right h2 {
  margin-bottom: 20px;
}

/* Input Fields */
.input-box {
  margin-bottom: 15px;
}

.input-box input,
.input-box select {
  width: 100%;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  outline: none;
  transition: 0.3s;
}

.input-box input:focus,
.input-box select:focus {
  border-color: #667eea;
}

/* Checkbox */
.checkbox {
  display: flex;
  align-items: center;
  margin-bottom: 15px;
}

.checkbox input {
  margin-right: 8px;
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  opacity: 0.9;
}

/* Responsive */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
    width: 90%;
  }
  .left, .right {
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="container">

  <!-- Left Panel -->
  <div class="left">
    <h2>Welcome!</h2>
    <p>Create your account and start your journey with us.</p>
  </div>

  <!-- Right Panel -->
  <div class="right">
    <h2>Register</h2>

    <form onsubmit="return validateForm()">

      <div class="input-box">
        <input type="text" id="name" placeholder="Full Name" required>
      </div>

      <div class="input-box">
        <input type="email" id="email" placeholder="Email Address" required>
      </div>

      <div class="input-box">
        <input type="password" id="password" placeholder="Password" required>
      </div>

      <div class="input-box">
        <input type="tel" placeholder="Phone Number" required>
      </div>

      <div class="input-box">
        <select required>
          <option value="">Select Course</option>
          <option>Frontend</option>
          <option>Backend</option>
          <option>Full Stack</option>
        </select>
      </div>

      <div class="checkbox">
        <input type="checkbox" id="terms">
        <label for="terms">I accept Terms & Conditions</label>
      </div>

      <button type="submit">Register</button>

    </form>
  </div>

</div>

<script>
function validateForm() {
  let password = document.getElementById("password").value;
  let terms = document.getElementById("terms").checked;

  if (password.length < 6) {
    alert("Password must be at least 6 characters");
    return false;
  }

  if (!terms) {
    alert("Please accept Terms & Conditions");
    return false;
  }

  alert("Registration Successful!");
  return true;
}
</script>

</body>
</html>
